<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>Music Practice</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="nav">
  <span class="nav-title">🎵</span>
  <button class="nav-btn active" data-page="vamp"  onclick="showPage('vamp')">Vamp</button>
  <button class="nav-btn"        data-page="jam"   onclick="showPage('jam')">Jam</button>
  <button class="nav-btn"        data-page="songs" onclick="showPage('songs')">Songs</button>
  <button class="nav-btn"        data-page="prefs" onclick="showPage('prefs')">Preferences</button>
  <div class="nav-spacer"></div>
  <div class="conn-indicator" id="conn-indicator" title="Server connection">
    <div class="conn-dot" id="conn-dot"></div>
    <span class="conn-label" id="conn-label">connecting…</span>
  </div>
</nav>

<!-- VAMP PAGE -->
<div class="page active" id="page-vamp">
  <div id="vamp-controls"></div>
  <div id="vamp-phrase"></div>
  <div class="playback-panel" id="vamp-playback">
    <div class="playback-elapsed" id="vamp-elapsed">—</div>
    <div class="playback-meta">
      <span class="playback-meta-val" id="vamp-loop-val">—</span>
      <span class="playback-meta-lbl">loop</span>
    </div>
    <div class="playback-state" id="vamp-state">stopped</div>
  </div>
</div>

<!-- JAM PAGE -->
<div class="page" id="page-jam">
  <div id="jam-controls"></div>
  <div class="playback-panel" id="jam-playback">
    <div class="playback-elapsed" id="jam-elapsed">—</div>
    <div class="playback-meta">
      <span class="playback-meta-val" id="jam-loop-val">—</span>
      <span class="playback-meta-lbl">loop</span>
    </div>
    <div class="playback-state" id="jam-state">stopped</div>
  </div>
  <div id="jam-chart"></div>
</div>

<!-- SONGS PAGE -->
<div class="page" id="page-songs">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
    <h2 style="font-size:18px;">Songs</h2>
    <button class="btn btn-primary" onclick="newSong()">+ New Song</button>
  </div>
  <div id="songs-list"></div>
</div>

<!-- SONG EDITOR PAGE -->
<div class="page" id="page-editor">
  <div id="editor-controls"></div>
  <div class="playback-panel" id="editor-playback">
    <div class="playback-elapsed" id="editor-elapsed">—</div>
    <div class="playback-meta">
      <span class="playback-meta-val" id="editor-loop-val">—</span>
      <span class="playback-meta-lbl">loop</span>
    </div>
    <div class="playback-state" id="editor-state">stopped</div>
  </div>
  <div id="editor-chart"></div>
</div>

<!-- PREFERENCES PAGE -->
<div class="page" id="page-prefs">
  <h2 style="font-size:18px;margin-bottom:20px;">Preferences</h2>
  <div id="prefs-form"></div>
</div>

<div class="statusbar">
  <span id="status-msg">Ready</span>
  <span id="status-sf"></span>
</div>

<!-- modal (used for song title only) -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal">
    <h3 id="modal-title">Song Title</h3>
    <input class="modal-input" id="modal-input" placeholder="My Song" autocomplete="off" />
    <div class="modal-actions">
      <button class="btn btn-ghost btn-sm" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary btn-sm" onclick="confirmChord()">OK</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
